<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrickDRS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body, html {
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 700px;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    h1 {
      font-size: 2.8rem;
      color: #ffcc00;
      margin-bottom: 20px;
      text-shadow: 2px 2px 10px rgba(255, 204, 0, 0.8);
    }

    .video {
      width: 100%;
      max-width: 100%;
      border: 4px solid #ffcc00;
      border-radius: 15px;
      background-color: black;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      background: #ffcc00;
      border: none;
      color: black;
      padding: 12px 25px;
      font-size: 1.2rem;
      margin: 5px;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(255, 204, 0, 0.5);
      transition: all 0.3s ease-in-out;
      font-weight: bold;
    }

    .btn:hover {
      background: #ffaa00;
      transform: scale(1.1);
    }

    .upload-section {
      margin-top: 20px;
    }

    .upload-btn {
      background: #ff4500;
      color: white;
      padding: 12px 25px;
      font-size: 1.2rem;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(255, 69, 0, 0.5);
      text-decoration: none;
      font-weight: bold;
    }

    .upload-btn:hover {
      background: #ff6347;
      transform: scale(1.05);
    }

    input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CrickDRS</h1>
    <video id="video" class="video"></video>
    <div class="controls">
      <button id="backward-fast" class="btn">⏪ Backward (Fast)</button>
      <button id="backward" class="btn">⏪ Backward</button>
      <button id="forward" class="btn">⏩ Forward</button>
      <button id="forward-fast" class="btn">⏩ Forward (Fast)</button>
    </div>
    <div class="upload-section">
      <label for="fileUpload" class="upload-btn">📂 Upload Video</label>
      <input type="file" id="fileUpload" accept="video/*">
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const fileUpload = document.getElementById('fileUpload');
    const forwardButton = document.getElementById('forward');
    const backwardButton = document.getElementById('backward');
    const forwardFastButton = document.getElementById('forward-fast');
    const backwardFastButton = document.getElementById('backward-fast');

    fileUpload.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (file) {
        const fileURL = URL.createObjectURL(file);
        video.src = fileURL;
        video.load();
      }
    });

    forwardButton.addEventListener('click', () => {
      video.currentTime = Math.min(video.currentTime + 0.10, video.duration);
      video.play();
      setTimeout(() => video.pause(), 100);
    });

    backwardButton.addEventListener('click', () => {
      video.currentTime = Math.max(0, video.currentTime - 0.10);
      video.play();
      setTimeout(() => video.pause(), 100);
    });

    forwardFastButton.addEventListener('click', () => {
      video.currentTime = Math.min(video.currentTime + 2, video.duration);
      video.play();
      setTimeout(() => video.pause(), 2000);
    });

    backwardFastButton.addEventListener('click', () => {
      video.currentTime = Math.max(0, video.currentTime - 2);
      video.play();
      setTimeout(() => video.pause(), 2000);
    });

    video.addEventListener('ended', () => video.pause());
  </script>
</body>
</html>
