<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrickDRS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body,html{height:100%;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);} 
.container{width:100%;max-width:750px;padding:25px;border-radius:20px;background:rgba(0,0,0,0.75);text-align:center;}
h1{color:#00e6ff;margin-bottom:10px;}
.video{width:100%;border-radius:15px;border:3px solid #00e6ff;}
.controls{margin-top:15px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.btn{padding:10px 15px;border:none;border-radius:25px;color:white;font-weight:bold;cursor:pointer;transition:0.3s;}
.btn:hover{transform:scale(1.1);} 
#play{background:#00c9a7;} #start{background:#00ff87;} #end{background:#ff4b2b;} 
#forward{background:#5b86e5;} #backward{background:#8360c3;} 
#forward-fast{background:#ffd200;} #backward-fast{background:#ee0979;} 
#slow{background:#ff9800;} #normal{background:#4caf50;} 
.timeline{width:100%;margin-top:10px;}
.time-text{color:white;font-size:0.9rem;margin-top:5px;}
.upload-btn{display:inline-block;margin-top:15px;padding:10px 20px;border-radius:25px;background:#ff512f;color:white;cursor:pointer;}
input{display:none;}
</style>
</head>
<body>
<div class="container">
<h1>🎯 CrickDRS</h1>
<video id="video" class="video"></video>

<input type="range" id="timeline" class="timeline" min="0" max="100" value="0">
<div id="timeText" class="time-text">0:00 / 0:00</div>

<div class="controls">
<button id="start" class="btn">⏮</button>
<button id="backward-fast" class="btn">⏪</button>
<button id="backward" class="btn">⬅</button>
<button id="play" class="btn">▶</button>
<button id="forward" class="btn">➡</button>
<button id="forward-fast" class="btn">⏩</button>
<button id="end" class="btn">⏭</button>
<button id="slow" class="btn">🐢 0.25x</button>
</div>

<label for="fileUpload" class="upload-btn">📂 Upload Video</label>
<input type="file" id="fileUpload" accept="video/*">
</div>

<script>
const video=document.getElementById('video');
const timeline=document.getElementById('timeline');
const timeText=document.getElementById('timeText');
const playBtn=document.getElementById('play');
const slowBtn=document.getElementById('slow');

// upload
fileUpload.onchange=e=>{
 const file=e.target.files[0];
 if(file){video.src=URL.createObjectURL(file);} 
};

// timeline update
video.ontimeupdate=()=>{
 timeline.value=(video.currentTime/video.duration)*100||0;
 timeText.textContent=format(video.currentTime)+" / "+format(video.duration);
};

timeline.oninput=()=>{
 video.currentTime=(timeline.value/100)*video.duration;
};

function format(t){if(!t)return"0:00";let m=Math.floor(t/60);let s=Math.floor(t%60);return m+":"+(s<10?"0":"")+s;}

// FIXED BUTTONS
start.onclick=()=>{video.currentTime=0;video.play();};
end.onclick=()=>{if(video.duration){video.currentTime=video.duration-0.1;video.pause();}};
forward.onclick=()=>{video.currentTime=Math.min(video.currentTime+0.1,video.duration);};
backward.onclick=()=>{video.currentTime=Math.max(video.currentTime-0.1,0);};
forward_fast.onclick=()=>{video.currentTime=Math.min(video.currentTime+2,video.duration);};
backward_fast.onclick=()=>{video.currentTime=Math.max(video.currentTime-2,0);};

// play pause
playBtn.onclick=()=>{
 if(video.paused){video.play();playBtn.textContent="⏸";} 
 else{video.pause();playBtn.textContent="▶";}
};

// slow / normal toggle
let slow=false;
slowBtn.onclick=()=>{
 slow=!slow;
 if(slow){video.playbackRate=0.25;slowBtn.textContent="⚡ Normal";}
 else{video.playbackRate=1;slowBtn.textContent="🐢 0.25x";}
};
</script>
</body>
</html>
